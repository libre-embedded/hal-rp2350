---
structs:
  syscfg:
    description: |-
      Register block for various chip control signals
    instances:
      - name: SYSCFG
        address: '0x40008000'
    fields:
      - name: PROC_CONFIG
        type: uint32_t
        expected_size: 4
        expected_offset: 0
        const: true
        description: |-
          (read-only) Configuration for processors
        fields:
          - name: PROC0_HALTED
            description: |-
              Indication that proc0 has halted
            index: 0
            width: 1
            read: true
            write: false
          - name: PROC1_HALTED
            description: |-
              Indication that proc1 has halted
            index: 1
            width: 1
            read: true
            write: false
      - name: PROC_IN_SYNC_BYPASS
        type: uint32_t
        expected_size: 4
        expected_offset: 4
        description: |-
          (read-write) For each bit, if 1, bypass the input synchronizer between that GPIO 
                              and the GPIO input register in the SIO. The input synchronizers should 
                              generally be unbypassed, to avoid injecting metastabilities into processors. 
                              If you're feeling brave, you can bypass to save two cycles of input 
                              latency. This register applies to GPIO 0...31.
        fields:
          - name: GPIO
            index: 0
            width: 32
            read: true
            write: true
      - name: PROC_IN_SYNC_BYPASS_HI
        type: uint32_t
        expected_size: 4
        expected_offset: 8
        description: |-
          (read-write) For each bit, if 1, bypass the input synchronizer between that GPIO 
                              and the GPIO input register in the SIO. The input synchronizers should 
                              generally be unbypassed, to avoid injecting metastabilities into processors. 
                              If you're feeling brave, you can bypass to save two cycles of input 
                              latency. This register applies to GPIO 32...47. USB GPIO 56..57 QSPI GPIO 58..63
        fields:
          - name: GPIO
            index: 0
            width: 16
            read: true
            write: true
          - name: USB_DP
            index: 24
            width: 1
            read: true
            write: true
          - name: USB_DM
            index: 25
            width: 1
            read: true
            write: true
          - name: QSPI_SCK
            index: 26
            width: 1
            read: true
            write: true
          - name: QSPI_CSN
            index: 27
            width: 1
            read: true
            write: true
          - name: QSPI_SD
            index: 28
            width: 4
            read: true
            write: true
      - name: DBGFORCE
        type: uint32_t
        expected_size: 4
        expected_offset: 12
        description: |-
          (read-write) Directly control the chip SWD debug port
        fields:
          - name: SWDO
            description: |-
              Observe the value of SWDIO output.
            index: 0
            width: 1
            read: true
            write: false
          - name: SWDI
            description: |-
              Directly drive SWDIO input, if ATTACH is set
            index: 1
            width: 1
            read: true
            write: true
          - name: SWCLK
            description: |-
              Directly drive SWCLK, if ATTACH is set
            index: 2
            width: 1
            read: true
            write: true
          - name: ATTACH
            description: |-
              Attach chip debug port to syscfg controls, and disconnect it from external SWD pads.
            index: 3
            width: 1
            read: true
            write: true
      - name: MEMPOWERDOWN
        type: uint32_t
        expected_size: 4
        expected_offset: 16
        description: |-
          (read-write) Control PD pins to memories. 
                              Set high to put memories to a low power state. In this state the memories will retain contents but not be accessible 
                              Use with caution
        fields:
          - name: SRAM0
            index: 0
            width: 1
            read: true
            write: true
          - name: SRAM1
            index: 1
            width: 1
            read: true
            write: true
          - name: SRAM2
            index: 2
            width: 1
            read: true
            write: true
          - name: SRAM3
            index: 3
            width: 1
            read: true
            write: true
          - name: SRAM4
            index: 4
            width: 1
            read: true
            write: true
          - name: SRAM5
            index: 5
            width: 1
            read: true
            write: true
          - name: SRAM6
            index: 6
            width: 1
            read: true
            write: true
          - name: SRAM7
            index: 7
            width: 1
            read: true
            write: true
          - name: SRAM8
            index: 8
            width: 1
            read: true
            write: true
          - name: SRAM9
            index: 9
            width: 1
            read: true
            write: true
          - name: USB
            index: 10
            width: 1
            read: true
            write: true
          - name: ROM
            index: 11
            width: 1
            read: true
            write: true
          - name: BOOTRAM
            index: 12
            width: 1
            read: true
            write: true
      - name: AUXCTRL
        type: uint32_t
        expected_size: 4
        expected_offset: 20
        description: |-
          (read-write) Auxiliary system control register
        fields:
          - name: AUXCTRL
            description: |-
              * Bits 7:3: Reserved
                                          * Bit 2: Set to mask OTP power analogue power supply detection from resetting OTP controller and PSM

                                          * Bit 1: When clear, the LPOSC output is XORed into the TRNG ROSC output as an additional, uncorrelated entropy source. When set, this behaviour is disabled.

                                          * Bit 0: Force POWMAN clock to switch to LPOSC, by asserting its WDRESET input. This must be set before initiating a watchdog reset of the RSM from a stage that includes CLOCKS, if POWMAN is running from clk_ref at the point that the watchdog reset takes place. Otherwise, the short pulse generated on clk_ref by the reset of the CLOCKS block may affect POWMAN register state.
            index: 0
            width: 8
            read: true
            write: true
enums: {}
