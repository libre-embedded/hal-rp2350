---
structs:
  watchdog:
    instances:
      - name: WATCHDOG
        address: '0x400d8000'
    fields:
      - name: CTRL
        type: uint32_t
        expected_size: 4
        expected_offset: 0
        description: |-
          (read-write) Watchdog control 
                              The rst_wdsel register determines which subsystems are reset when the watchdog is triggered. 
                              The watchdog can be triggered in software.
        fields:
          - name: TIME
            description: |-
              Indicates the time in usec before a watchdog reset will be triggered
            index: 0
            width: 24
            read: true
            write: false
          - name: PAUSE_JTAG
            description: |-
              Pause the watchdog timer when JTAG is accessing the bus fabric
            index: 24
            width: 1
            read: true
            write: true
          - name: PAUSE_DBG0
            description: |-
              Pause the watchdog timer when processor 0 is in debug mode
            index: 25
            width: 1
            read: true
            write: true
          - name: PAUSE_DBG1
            description: |-
              Pause the watchdog timer when processor 1 is in debug mode
            index: 26
            width: 1
            read: true
            write: true
          - name: ENABLE
            description: |-
              When not enabled the watchdog timer is paused
            index: 30
            width: 1
            read: true
            write: true
          - name: TRIGGER
            description: |-
              Trigger a watchdog reset
            index: 31
            width: 1
            read: false
            write: true
      - name: LOAD
        type: uint32_t
        expected_size: 4
        expected_offset: 4
        description: |-
          (write-only) Load the watchdog timer. The maximum setting is 0xffffff which corresponds to approximately 16 seconds.
        fields:
          - name: LOAD
            index: 0
            width: 24
            read: false
            write: true
      - name: REASON
        type: uint32_t
        expected_size: 4
        expected_offset: 8
        const: true
        description: |-
          (read-only) Logs the reason for the last reset. Both bits are zero for the case of a hardware reset.

                              Additionally, as of RP2350, a debugger warm reset of either core (SYSRESETREQ or hartreset) will also clear the watchdog reason register, so that software loaded under the debugger following a watchdog timeout will not continue to see the timeout condition.
        fields:
          - name: TIMER
            index: 0
            width: 1
            read: true
            write: false
          - name: FORCE
            index: 1
            width: 1
            read: true
            write: false
      - name: SCRATCH0
        type: uint32_t
        expected_size: 4
        expected_offset: 12
        description: |-
