---
structs:
  dma:
    description: |-
      DMA with separate read and write masters
    instances:
      - name: DMA
        address: '0x50000000'
    fields:
      - name: CONTROL
        type: dma_control
        array_length: &max_channels 16
        expected_size: &block_size 1024
        expected_offset: 0

      - name: INT
        type: dma_interrupt
        array_length: 4
        expected_size: 64
        expected_offset: 1024

      - name: TIMER
        type: uint32_t
        array_length: 4
        expected_size: 16
        expected_offset: 1088
        description: |-
          (read-write) Pacing (X/Y) fractional timer
                              The pacing timer produces TREQ assertions at a rate set by ((X/Y) * sys_clk). This equation is evaluated every sys_clk cycles and therefore can only generate TREQs at a rate of 1 per sys_clk (i.e. permanent TREQ) or less.
        fields:
          - name: Y
            description: |-
              Pacing Timer Divisor. Specifies the Y value for the (X/Y) fractional timer.
            index: 0
            width: 16
            read: true
            write: true
          - name: X
            description: |-
              Pacing Timer Dividend. Specifies the X value for the (X/Y) fractional timer.
            index: 16
            width: 16
            read: true
            write: true

      - name: MULTI_CHAN_TRIGGER
        type: uint32_t
        expected_size: 4
        expected_offset: 1104
        description: |-
          (write-only) Trigger one or more channels simultaneously
        fields:
          - name: MULTI_CHAN_TRIGGER
            description: |-
              Each bit in this register corresponds to a DMA channel. Writing a 1 to the relevant bit is the same as writing to that channel's trigger register; the channel will start if it is currently enabled and not already busy.
            index: 0
            width: 16
            read: false
            write: true
      - name: SNIFF_CTRL
        type: uint32_t
        expected_size: 4
        expected_offset: 1108
        description: |-
          (read-write) Sniffer Control
        fields:
          - name: EN
            description: |-
              Enable sniffer
            index: 0
            width: 1
            read: true
            write: true
          - name: DMACH
            description: |-
              DMA channel for Sniffer to observe
            index: 1
            width: 4
            read: true
            write: true
          - name: CALC
            index: 5
            width: 4
            read: true
            write: true
            type: DMA_SNIFF_CTRL_CALC
          - name: BSWAP
            description: |-
              Locally perform a byte reverse on the sniffed data, before feeding into checksum.

                                          Note that the sniff hardware is downstream of the DMA channel byteswap performed in the read master: if channel CTRL_BSWAP and SNIFF_CTRL_BSWAP are both enabled, their effects cancel from the sniffer's point of view.
            index: 9
            width: 1
            read: true
            write: true
          - name: OUT_REV
            description: |-
              If set, the result appears bit-reversed when read. This does not affect the way the checksum is calculated; the result is transformed on-the-fly between the result register and the bus.
            index: 10
            width: 1
            read: true
            write: true
          - name: OUT_INV
            description: |-
              If set, the result appears inverted (bitwise complement) when read. This does not affect the way the checksum is calculated; the result is transformed on-the-fly between the result register and the bus.
            index: 11
            width: 1
            read: true
            write: true
      - name: SNIFF_DATA
        type: uint32_t
        expected_size: 4
        expected_offset: 1112
        description: |-
          (read-write) Data accumulator for sniff hardware
        fields:
          - name: SNIFF_DATA
            description: |-
              Write an initial seed value here before starting a DMA transfer on the channel indicated by SNIFF_CTRL_DMACH. The hardware will update this register each time it observes a read from the indicated channel. Once the channel completes, the final result can be read from this register.
            index: 0
            width: 32
            read: true
            write: true
      - name: FIFO_LEVELS
        type: uint32_t
        expected_size: 4
        expected_offset: 1120
        const: true
        description: |-
          (read-only) Debug RAF, WAF, TDF levels
        fields:
          - name: TDF_LVL
            description: |-
              Current Transfer-Data-FIFO fill level
            index: 0
            width: 8
            read: true
            write: false
          - name: WAF_LVL
            description: |-
              Current Write-Address-FIFO fill level
            index: 8
            width: 8
            read: true
            write: false
          - name: RAF_LVL
            description: |-
              Current Read-Address-FIFO fill level
            index: 16
            width: 8
            read: true
            write: false
      - name: CHAN_ABORT
        type: uint32_t
        expected_size: 4
        expected_offset: 1124
        description: |-
          (read-write) Abort an in-progress transfer sequence on one or more channels
        fields:
          - name: CHAN_ABORT
            description: |-
              Each bit corresponds to a channel. Writing a 1 aborts whatever transfer sequence is in progress on that channel. The bit will remain high until any in-flight transfers have been flushed through the address and data FIFOs.

                                          After writing, this register must be polled until it returns all-zero. Until this point, it is unsafe to restart the channel.
            index: 0
            width: 16
            read: true
            write: true
      - name: N_CHANNELS
        type: uint32_t
        expected_size: 4
        expected_offset: 1128
        const: true
        description: |-
          (read-only) The number of channels this DMA instance is equipped with. This DMA supports up to 16 hardware channels, but can be configured with as few as one, to minimise silicon area.
        fields:
          - name: N_CHANNELS
            index: 0
            width: 5
            read: true
            write: false

      - name: SECCFG
        type: uint32_t
        array_length: *max_channels
        expected_size: 64
        expected_offset: 1152
        description: |-
          (read-write) Security configuration for channel 0. Control whether this channel performs Secure/Non-secure and Privileged/Unprivileged bus accesses.

                              If this channel generates bus accesses of some security level, an access of at least that level (in the order S+P > S+U > NS+P > NS+U) is required to program, trigger, abort, check the status of, interrupt on or acknowledge the interrupt of this channel.

                              This register automatically locks down (becomes read-only) once software starts to configure the channel.

                              This register is world-readable, but is writable only from a Secure, Privileged context.
        fields:
          - name: P
            description: |-
              Privileged channel. If 1, this channel performs Privileged bus accesses. If 0, it performs Unprivileged bus accesses.

                                          If 1, this channel is controllable only from a Privileged context of the same Secure/Non-secure level, or any context of a higher Secure/Non-secure level.
            index: 0
            width: 1
            read: true
            write: true
          - name: S
            description: |-
              Secure channel. If 1, this channel performs Secure bus accesses. If 0, it performs Non-secure bus accesses.

                                          If 1, this channel is controllable only from a Secure context.
            index: 1
            width: 1
            read: true
            write: true
          - name: LOCK
            description: |-
              LOCK is 0 at reset, and is set to 1 automatically upon a successful write to this channel's control registers. That is, a write to CTRL, READ_ADDR, WRITE_ADDR, TRANS_COUNT and their aliases.

                                          Once its LOCK bit is set, this register becomes read-only.

                                          A failed write, for example due to the write's privilege being lower than that specified in the channel's SECCFG register, will not set the LOCK bit.
            index: 2
            width: 1
            read: true
            write: true

      - name: SECCFG_IRQ
        type: uint32_t
        array_length: 4
        expected_size: 16
        expected_offset: 1216
        description: |-
          (read-write) Security configuration for IRQ 0. Control whether the IRQ permits configuration by Non-secure/Unprivileged contexts, and whether it can observe Secure/Privileged channel interrupt flags.
        fields:
          - name: P
            description: |-
              Privileged IRQ. If 1, this IRQ's control registers can only be accessed from a Privileged context.

                                          If 0, this IRQ's control registers can be accessed from an Unprivileged context, but Privileged channels (as per SECCFG_CHx) are masked from the IRQ status, and this IRQ's registers can not be used to acknowledge the channel interrupts of Privileged channels.
            index: 0
            width: 1
            read: true
            write: true
          - name: S
            description: |-
              Secure IRQ. If 1, this IRQ's control registers can only be accessed from a Secure context.

                                          If 0, this IRQ's control registers can be accessed from a Non-secure context, but Secure channels (as per SECCFG_CHx) are masked from the IRQ status, and this IRQ's registers can not be used to acknowledge the channel interrupts of Secure channels.
            index: 1
            width: 1
            read: true
            write: true

      - name: SECCFG_MISC
        type: uint32_t
        expected_size: 4
        expected_offset: 1232
        description: |-
          (read-write) Miscellaneous security configuration
        fields:
          - name: SNIFF_P
            description: |-
              If 1, the sniffer can see data transfers from Privileged channels, and can itself only be accessed from a privileged context, or from a Secure context when SNIFF_S is 0.

                                          If 0, the sniffer can be accessed from either a Privileged or Unprivileged context (with sufficient security level) but can not see transfers from Privileged channels.
            index: 0
            width: 1
            read: true
            write: true
          - name: SNIFF_S
            description: |-
              If 1, the sniffer can see data transfers from Secure channels, and can itself only be accessed from a Secure context.

                                          If 0, the sniffer can be accessed from either a Secure or Non-secure context, but can not see data transfers of Secure channels.
            index: 1
            width: 1
            read: true
            write: true
          - name: TIMER0_P
            description: |-
              If 1, the TIMER0 register is only accessible from a Privileged (or more Secure) context, and timer DREQ 0 is only visible to Privileged (or more Secure) channels.
            index: 2
            width: 1
            read: true
            write: true
          - name: TIMER0_S
            description: |-
              If 1, the TIMER0 register is only accessible from a Secure context, and timer DREQ 0 is only visible to Secure channels.
            index: 3
            width: 1
            read: true
            write: true
          - name: TIMER1_P
            description: |-
              If 1, the TIMER1 register is only accessible from a Privileged (or more Secure) context, and timer DREQ 1 is only visible to Privileged (or more Secure) channels.
            index: 4
            width: 1
            read: true
            write: true
          - name: TIMER1_S
            description: |-
              If 1, the TIMER1 register is only accessible from a Secure context, and timer DREQ 1 is only visible to Secure channels.
            index: 5
            width: 1
            read: true
            write: true
          - name: TIMER2_P
            description: |-
              If 1, the TIMER2 register is only accessible from a Privileged (or more Secure) context, and timer DREQ 2 is only visible to Privileged (or more Secure) channels.
            index: 6
            width: 1
            read: true
            write: true
          - name: TIMER2_S
            description: |-
              If 1, the TIMER2 register is only accessible from a Secure context, and timer DREQ 2 is only visible to Secure channels.
            index: 7
            width: 1
            read: true
            write: true
          - name: TIMER3_P
            description: |-
              If 1, the TIMER3 register is only accessible from a Privileged (or more Secure) context, and timer DREQ 3 is only visible to Privileged (or more Secure) channels.
            index: 8
            width: 1
            read: true
            write: true
          - name: TIMER3_S
            description: |-
              If 1, the TIMER3 register is only accessible from a Secure context, and timer DREQ 3 is only visible to Secure channels.
            index: 9
            width: 1
            read: true
            write: true
      - name: MPU_CTRL
        type: uint32_t
        expected_size: 4
        expected_offset: 1280
        description: |-
          (read-write) Control register for DMA MPU. Accessible only from a Privileged context.
        fields:
          - name: P
            description: |-
              Determine whether an address not covered by an active MPU region is Privileged (1) or Unprivileged (0)
            index: 1
            width: 1
            read: true
            write: true
          - name: S
            description: |-
              Determine whether an address not covered by an active MPU region is Secure (1) or Non-secure (0)
            index: 2
            width: 1
            read: true
            write: true
          - name: NS_HIDE_ADDR
            description: |-
              By default, when a region's S bit is clear, Non-secure-Privileged reads can see the region's base address and limit address. Set this bit to make the addresses appear as 0 to Non-secure reads, even when the region is Non-secure, to avoid leaking information about the processor SAU map.
            index: 3
            width: 1
            read: true
            write: true

      - name: MPU_BAR0
        type: uint32_t
        expected_size: 4
        expected_offset: 1284
        description: |-
          (read-write) Base address register for MPU region 0. Writable only from a Secure, Privileged context.
        fields:
          - name: ADDR
            description: |-
              This MPU region matches addresses where addr[31:5] (the 27 most significant bits) are greater than or equal to BAR_ADDR, and less than or equal to LAR_ADDR.

                                          Readable from any Privileged context, if and only if this region's S bit is clear, and MPU_CTRL_NS_HIDE_ADDR is clear. Otherwise readable only from a Secure, Privileged context.
            index: 5
            width: 27
            read: true
            write: true
      - name: MPU_LAR0
        type: uint32_t
        expected_size: 4
        expected_offset: 1288
        description: |-
          (read-write) Limit address register for MPU region 0. Writable only from a Secure, Privileged context, with the exception of the P bit.
        fields:
          - name: EN
            description: |-
              Region enable. If 1, any address within range specified by the base address (BAR_ADDR) and limit address (LAR_ADDR) has the attributes specified by S and P.
            index: 0
            width: 1
            read: true
            write: true
          - name: P
            description: |-
              Determines the Privileged/Unprivileged (=1/0) status of addresses matching this region, if this region is enabled. Writable from any Privileged context, if and only if the S bit is clear. Otherwise, writable only from a Secure, Privileged context.
            index: 1
            width: 1
            read: true
            write: true
          - name: S
            description: |-
              Determines the Secure/Non-secure (=1/0) status of addresses matching this region, if this region is enabled.
            index: 2
            width: 1
            read: true
            write: true
          - name: ADDR
            description: |-
              Limit address bits 31:5. Readable from any Privileged context, if and only if this region's S bit is clear, and MPU_CTRL_NS_HIDE_ADDR is clear. Otherwise readable only from a Secure, Privileged context.
            index: 5
            width: 27
            read: true
            write: true
