            index: 15
            width: 1
            read: true
            write: false
          - name: DISABLE_WATCHDOG_SCRATCH
            index: 16
            width: 1
            read: true
            write: false
          - name: DISABLE_BOOTSEL_USB_MSD_IFC
            index: 17
