            index: 18
            width: 1
            read: true
            write: false
          - name: DISABLE_BOOTSEL_UART_BOOT
            index: 19
            width: 1
            read: true
            write: false
          - name: DISABLE_XIP_ACCESS_ON_SRAM_ENTRY
            description: |-
              Disable all access to XIP after entering an SRAM binary.

                                          Note that this will cause bootrom APIs that access XIP to fail, including APIs that interact with the partition table.
            index: 20
            width: 1
            read: true
