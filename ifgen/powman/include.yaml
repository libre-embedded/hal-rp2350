        expected_offset: 4
        description: |-
          (read-write) Voltage Regulator Control
        fields:
          - name: HT_TH
            description: |-
              high temperature protection threshold 
                                          regulator power transistors are disabled when junction temperature exceeds threshold 
                                          000 - 100C 
                                          001 - 105C 
                                          010 - 110C 
                                          011 - 115C 
                                          100 - 120C 
                                          101 - 125C 
                                          110 - 135C 
                                          111 - 150C
            index: 4
            width: 3
            read: true
            write: true
          - name: DISABLE_VOLTAGE_LIMIT
            description: |-
              0=not disabled, 1=enabled
            index: 8
            width: 1
            read: true
            write: true
          - name: ISOLATE
            description: |-
              isolates the VREG control interface 
                                          0 - not isolated (default) 
                                          1 - isolated
            index: 12
            width: 1
            read: true
            write: true
          - name: UNLOCK
            description: |-
              unlocks the VREG control interface after power up 
                                          0 - Locked (default) 
                                          1 - Unlocked 
                                          It cannot be relocked when it is unlocked.
            index: 13
            width: 1
            read: true
            write: true
          - name: RST_N
            description: |-
