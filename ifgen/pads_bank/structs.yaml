---
structs:
  pads_bank:
    instances:
      - name: PADS_BANK
        address: '0x40038000'
    fields:
      - name: VOLTAGE_SELECT
        type: uint32_t
        expected_size: 4
        expected_offset: 0
        description: |-
          (read-write) Voltage select. Per bank control
        fields:
          - name: VOLTAGE_SELECT
            index: 0
            width: 1
            read: true
            write: true

      - name: GPIO
        type: uint32_t
        array_length: 48
        expected_offset: 4
        fields: &fields
          - name: SLEWFAST
            description: |-
              Slew rate control. 1 = Fast, 0 = Slow
            index: 0
            width: 1
            read: true
            write: true
          - name: SCHMITT
            description: |-
              Enable schmitt trigger
            index: 1
            width: 1
            read: true
            write: true
          - name: PDE
            description: |-
              Pull down enable
            index: 2
            width: 1
            read: true
            write: true
          - name: PUE
            description: |-
              Pull up enable
            index: 3
            width: 1
            read: true
            write: true
          - name: DRIVE
            description: |-
              Drive strength.
            index: 4
            width: 2
            read: true
            write: true
            type: PADS_BANK_DRIVE
          - name: IE
            description: |-
              Input enable
            index: 6
            width: 1
            read: true
            write: true
          - name: OD
            description: |-
              Output disable. Has priority over output enable from peripherals
            index: 7
            width: 1
            read: true
            write: true
          - name: ISO
            description: |-
              Pad isolation control. Remove this once the pad is configured by software.
            index: 8
            width: 1
            read: true
            write: true

      - name: SWCLK
        type: uint32_t
        expected_size: 4
        expected_offset: 196
        fields: *fields

      - name: SWD
        type: uint32_t
        expected_size: 4
        expected_offset: 200
        fields: *fields
