---
structs:
  pwm:
    description: |-
      Simple PWM
    instances:
      - name: PWM
        address: '0x400a8000'
    fields:
      - name: CH0_CSR
        type: uint32_t
        expected_size: 4
        expected_offset: 0
        description: |-
          (read-write) Control and status register
        fields:
          - name: EN
            description: |-
              Enable the PWM channel.
            index: 0
            width: 1
            read: true
            write: true
          - name: PH_CORRECT
            description: |-
              1: Enable phase-correct modulation. 0: Trailing-edge
            index: 1
            width: 1
            read: true
            write: true
          - name: A_INV
            description: |-
              Invert output A
            index: 2
            width: 1
            read: true
            write: true
          - name: B_INV
            description: |-
              Invert output B
            index: 3
            width: 1
            read: true
            write: true
          - name: DIVMODE
            index: 4
            width: 2
            read: true
            write: true
            type: PWM_CH0_CSR_DIVMODE
          - name: PH_RET
            description: |-
              Retard the phase of the counter by 1 count, while it is running. 
                                          Self-clearing. Write a 1, and poll until low. Counter must be running.
            index: 6
            width: 1
            read: false
            write: true
          - name: PH_ADV
            description: |-
              Advance the phase of the counter by 1 count, while it is running. 
                                          Self-clearing. Write a 1, and poll until low. Counter must be running 
                                          at less than full speed (div_int + div_frac / 16 > 1)
            index: 7
            width: 1
            read: false
            write: true
      - name: CH0_DIV
        type: uint32_t
        expected_size: 4
        expected_offset: 4
        description: |-
          (read-write) INT and FRAC form a fixed-point fractional number. 
                              Counting rate is system clock frequency divided by this number. 
                              Fractional division uses simple 1st-order sigma-delta.
        fields:
          - name: FRAC
            index: 0
            width: 4
            read: true
            write: true
          - name: INT
            index: 4
            width: 8
            read: true
            write: true
      - name: CH0_CTR
        type: uint32_t
        expected_size: 4
        expected_offset: 8
        description: |-
          (read-write) Direct access to the PWM counter
        fields:
          - name: CH0_CTR
            index: 0
            width: 16
            read: true
            write: true
      - name: CH0_CC
        type: uint32_t
        expected_size: 4
        expected_offset: 12
        description: |-
          (read-write) Counter compare values
        fields:
          - name: A
            index: 0
