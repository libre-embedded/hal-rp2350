---
structs:
  otp_data:
    description: |-
      Predefined OTP data layout for RP2350
    instances:
      - name: OTP_DATA
        address: '0x40130000'
    fields:
      - name: CHIPID0
        type: uint16_t
        expected_size: 2
        expected_offset: 0
        const: true
        description: |-
          (read-only) Bits 15:0 of public device ID. (ECC)

                              The CHIPID0..3 rows contain a 64-bit random identifier for this chip, which can be read from the USB bootloader PICOBOOT interface or from the get_sys_info ROM API.

                              The number of random bits makes the occurrence of twins exceedingly unlikely: for example, a fleet of a hundred million devices has a 99.97% probability of no twinned IDs. This is estimated to be lower than the occurrence of process errors in the assignment of sequential random IDs, and for practical purposes CHIPID may be treated as unique.
        fields:
          - name: CHIPID0
            index: 0
            width: 16
            read: true
            write: false
      - name: CHIPID1
        type: uint16_t
        expected_size: 2
        expected_offset: 2
        const: true
        description: |-
          (read-only) Bits 31:16 of public device ID (ECC)
        fields:
          - name: CHIPID1
            index: 0
            width: 16
            read: true
            write: false
      - name: CHIPID2
        type: uint16_t
        expected_size: 2
        expected_offset: 4
        const: true
        description: |-
          (read-only) Bits 47:32 of public device ID (ECC)
        fields:
          - name: CHIPID2
            index: 0
            width: 16
            read: true
            write: false
      - name: CHIPID3
        type: uint16_t
        expected_size: 2
        expected_offset: 6
        const: true
        description: |-
          (read-only) Bits 63:48 of public device ID (ECC)
        fields:
          - name: CHIPID3
            index: 0
            width: 16
            read: true
            write: false
      - name: RANDID0
        type: uint16_t
        expected_size: 2
        expected_offset: 8
        const: true
        description: |-
          (read-only) Bits 15:0 of private per-device random number (ECC)

                              The RANDID0..7 rows form a 128-bit random number generated during device test.

                              This ID is not exposed through the USB PICOBOOT GET_INFO command or the ROM `get_sys_info()` API. However note that the USB PICOBOOT OTP access point can read the entirety of page 0, so this value is not meaningfully private unless the USB PICOBOOT interface is disabled via the DISABLE_BOOTSEL_USB_PICOBOOT_IFC flag in BOOT_FLAGS0.
        fields:
          - name: RANDID0
            index: 0
            width: 16
            read: true
            write: false
      - name: RANDID1
        type: uint16_t
        expected_size: 2
        expected_offset: 10
        const: true
        description: |-
          (read-only) Bits 31:16 of private per-device random number (ECC)
        fields:
          - name: RANDID1
            index: 0
            width: 16
            read: true
            write: false
      - name: RANDID2
        type: uint16_t
        expected_size: 2
        expected_offset: 12
        const: true
        description: |-
          (read-only) Bits 47:32 of private per-device random number (ECC)
        fields:
          - name: RANDID2
            index: 0
            width: 16
            read: true
            write: false
      - name: RANDID3
        type: uint16_t
        expected_size: 2
        expected_offset: 14
        const: true
        description: |-
          (read-only) Bits 63:48 of private per-device random number (ECC)
        fields:
          - name: RANDID3
            index: 0
            width: 16
            read: true
