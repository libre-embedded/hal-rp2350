---
structs:
  accessctrl:
    description: |-
      Hardware access control registers
    instances:
      - name: ACCESSCTRL
        address: '0x40060000'
    fields:
      - name: LOCK
        type: uint32_t
        expected_size: 4
        expected_offset: 0
        description: |-
          (read-write) Once a LOCK bit is written to 1, ACCESSCTRL silently ignores writes from that master. LOCK is writable only by a Secure, Privileged processor or debugger.

                              LOCK bits are only writable when their value is zero. Once set, they can never be cleared, except by a full reset of ACCESSCTRL

                              Setting the LOCK bit does not affect whether an access raises a bus error. Unprivileged writes, or writes from the DMA, will continue to raise bus errors. All other accesses will continue not to.
        fields:
          - name: CORE0
            index: 0
            width: 1
            read: true
            write: true
          - name: CORE1
            index: 1
            width: 1
            read: true
            write: true
          - name: DMA
            index: 2
            width: 1
            read: true
            write: false
          - name: DEBUG
            index: 3
            width: 1
            read: true
            write: true
      - name: FORCE_CORE_NS
        type: uint32_t
        expected_size: 4
        expected_offset: 4
        description: |-
          (read-write) Force core 1's bus accesses to always be Non-secure, no matter the core's internal state.

                              Useful for schemes where one core is designated as the Non-secure core, since some peripherals may filter individual registers internally based on security state but not on master ID.
        fields:
          - name: CORE1
            index: 1
            width: 1
            read: true
            write: true
      - name: CFGRESET
        type: uint32_t
        expected_size: 4
        expected_offset: 8
        description: |-
          (write-only) Write 1 to reset all ACCESSCTRL configuration, except for the LOCK and FORCE_CORE_NS registers.

                              This bit is used in the RP2350 bootrom to quickly restore ACCESSCTRL to a known state during the boot path.

                              Note that, like all registers in ACCESSCTRL, this register is not writable when the writer's corresponding LOCK bit is set, therefore a master which has been locked out of ACCESSCTRL can not use the CFGRESET register to disturb its contents.
        fields:
          - name: CFGRESET
            index: 0
            width: 1
            read: false
            write: true
      - name: GPIO_NSMASK0
        type: uint32_t
        expected_size: 4
        expected_offset: 12
        description: |-
          (read-write) Control whether GPIO0...31 are accessible to Non-secure code. Writable only by a Secure, Privileged processor or debugger.

                              0 -> Secure access only

                              1 -> Secure + Non-secure access
        fields:
          - name: GPIO_NSMASK0
            index: 0
            width: 32
            read: true
            write: true
      - name: GPIO_NSMASK1
        type: uint32_t
        expected_size: 4
        expected_offset: 16
        description: |-
          (read-write) Control whether GPIO32..47 are accessible to Non-secure code, and whether QSPI and USB bitbang are accessible through the Non-secure SIO. Writable only by a Secure, Privileged processor or debugger.
        fields:
          - name: GPIO
            index: 0
            width: 16
            read: true
            write: true
          - name: USB_DP
            index: 24
            width: 1
            read: true
            write: true
          - name: USB_DM
            index: 25
            width: 1
            read: true
            write: true
          - name: QSPI_SCK
            index: 26
            width: 1
            read: true
            write: true
          - name: QSPI_CSN
            index: 27
            width: 1
            read: true
            write: true
          - name: QSPI_SD
            index: 28
            width: 4
            read: true
            write: true
      - name: ROM
        type: uint32_t
        expected_size: 4
        expected_offset: 20
        description: |-
          (read-write) Control whether debugger, DMA, core 0 and core 1 can access ROM, and at what security/privilege levels they can do so.

                              Defaults to fully open access.

                              This register is writable only from a Secure, Privileged processor or debugger, with the exception of the NSU bit, which becomes Non-secure-Privileged-writable when the NSP bit is set.
        fields:
          - name: NSU
            description: |-
              If 1, and NSP is also set, ROM can be accessed from a Non-secure, Unprivileged context.

                                          This bit is writable from a Non-secure, Privileged context, if and only if the NSP bit is set.
            index: 0
            width: 1
            read: true
            write: true
          - name: NSP
            description: |-
              If 1, ROM can be accessed from a Non-secure, Privileged context.
            index: 1
            width: 1
            read: true
            write: true
          - name: SU
            description: |-
              If 1, and SP is also set, ROM can be accessed from a Secure, Unprivileged context.
            index: 2
            width: 1
            read: true
            write: true
          - name: SP
            description: |-
              If 1, ROM can be accessed from a Secure, Privileged context.
            index: 3
            width: 1
            read: true
            write: true
          - name: CORE0
            description: |-
              If 1, ROM can be accessed by core 0, at security/privilege levels permitted by SP/NSP/SU/NSU in this register.
            index: 4
            width: 1
            read: true
            write: true
          - name: CORE1
            description: |-
              If 1, ROM can be accessed by core 1, at security/privilege levels permitted by SP/NSP/SU/NSU in this register.
            index: 5
            width: 1
            read: true
            write: true
          - name: DMA
            description: |-
              If 1, ROM can be accessed by the DMA, at security/privilege levels permitted by SP/NSP/SU/NSU in this register.
            index: 6
            width: 1
            read: true
            write: true
          - name: DBG
            description: |-
              If 1, ROM can be accessed by the debugger, at security/privilege levels permitted by SP/NSP/SU/NSU in this register.
            index: 7
            width: 1
            read: true
            write: true
