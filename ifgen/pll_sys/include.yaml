---
structs:
  pll_sys:
    instances:
      - name: PLL_SYS
        address: '0x40050000'
      - name: PLL_USB
        address: '0x40058000'
    fields:
      - name: CS
        type: uint32_t
        expected_size: 4
        expected_offset: 0
        description: |-
          (read-write) Control and Status 
                              GENERAL CONSTRAINTS: 
                              Reference clock frequency min=5MHz, max=800MHz 
                              Feedback divider min=16, max=320 
                              VCO frequency min=750MHz, max=1600MHz
        fields:
          - name: REFDIV
            description: |-
              Divides the PLL input reference clock. 
                                          Behaviour is undefined for div=0. 
                                          PLL output will be unpredictable during refdiv changes, wait for lock=1 before using it.
            index: 0
            width: 6
            read: true
            write: true
          - name: BYPASS
            description: |-
              Passes the reference clock to the output instead of the divided VCO. The VCO continues to run so the user can switch between the reference clock and the divided VCO but the output will glitch when doing so.
            index: 8
            width: 1
            read: true
            write: true
          - name: LOCK_N
            description: |-
              PLL is not locked 
                                          Ideally this is cleared when PLL lock is seen and this should never normally be set
            index: 30
            width: 1
            read: true
            write: true
          - name: LOCK
            description: |-
              PLL is locked
            index: 31
            width: 1
            read: true
            write: false
      - name: PWR
        type: uint32_t
        expected_size: 4
        expected_offset: 4
        description: |-
          (read-write) Controls the PLL power modes.
        fields:
          - name: PD
            description: |-
              PLL powerdown 
                                          To save power set high when PLL output not required.
            index: 0
            width: 1
            read: true
            write: true
          - name: DSMPD
            description: |-
              PLL DSM powerdown 
                                          Nothing is achieved by setting this low.
            index: 2
            width: 1
            read: true
            write: true
          - name: POSTDIVPD
            description: |-
              PLL post divider powerdown 
                                          To save power set high when PLL output not required or bypass=1.
            index: 3
            width: 1
            read: true
            write: true
          - name: VCOPD
            description: |-
              PLL VCO powerdown 
                                          To save power set high when PLL output not required or bypass=1.
            index: 5
            width: 1
            read: true
            write: true
      - name: FBDIV_INT
        type: uint32_t
        expected_size: 4
        expected_offset: 8
        description: |-
          (read-write) Feedback divisor 
                              (note: this PLL does not support fractional division)
        fields:
          - name: FBDIV_INT
            description: |-
              see ctrl reg description for constraints
            index: 0
            width: 12
            read: true
            write: true
      - name: PRIM
        type: uint32_t
        expected_size: 4
        expected_offset: 12
        description: |-
          (read-write) Controls the PLL post dividers for the primary output 
                              (note: this PLL does not have a secondary output) 
                              the primary output is driven from VCO divided by postdiv1*postdiv2
        fields:
          - name: POSTDIV2
            description: |-
              divide by 1-7
            index: 12
            width: 3
            read: true
            write: true
          - name: POSTDIV1
            description: |-
              divide by 1-7
            index: 16
            width: 3
            read: true
            write: true
      - name: INTR
        type: uint32_t
        expected_size: 4
        expected_offset: 16
        description: |-
          (read-write) Raw Interrupts
        fields:
          - name: LOCK_N_STICKY
            index: 0
            width: 1
            read: true
            write: true
      - name: INTE
        type: uint32_t
        expected_size: 4
        expected_offset: 20
        description: |-
          (read-write) Interrupt Enable
        fields:
          - name: LOCK_N_STICKY
            index: 0
            width: 1
            read: true
            write: true
      - name: INTF
        type: uint32_t
        expected_size: 4
        expected_offset: 24
        description: |-
          (read-write) Interrupt Force
        fields:
          - name: LOCK_N_STICKY
            index: 0
            width: 1
            read: true
            write: true
      - name: INTS
        type: uint32_t
        expected_size: 4
        expected_offset: 28
        const: true
        description: |-
          (read-only) Interrupt status after masking & forcing
        fields:
          - name: LOCK_N_STICKY
            index: 0
            width: 1
            read: true
            write: false
enums: {}
