---
structs:
  glitch_detector:
    description: |-
      Glitch detector controls
    instances:
      - name: GLITCH_DETECTOR
        address: '0x40158000'
    fields:
      - name: ARM
        type: uint32_t
        expected_size: 4
        expected_offset: 0
        description: |-
          (read-write) Forcibly arm the glitch detectors, if they are not already armed by OTP. When armed, any individual detector trigger will cause a restart of the switched core power domain's power-on reset state machine.

                              Glitch detector triggers are recorded accumulatively in TRIG_STATUS. If the system is reset by a glitch detector trigger, this is recorded in POWMAN_CHIP_RESET.

                              This register is Secure read/write only.
        fields:
          - name: ARM
            index: 0
            width: 16
            read: true
            write: true
            type: GLITCH_DETECTOR_ARM_ARM
      - name: DISARM
        type: uint32_t
        expected_size: 4
        expected_offset: 4
        fields:
          - name: DISARM
            description: |-
              Forcibly disarm the glitch detectors, if they are armed by OTP. Ignored if ARM is YES.

                                          This register is Secure read/write only.
            index: 0
            width: 16
            read: true
            write: true
            type: GLITCH_DETECTOR_DISARM_DISARM
      - name: SENSITIVITY
        type: uint32_t
        expected_size: 4
        expected_offset: 8
        description: |-
          (read-write) Adjust the sensitivity of glitch detectors to values other than their OTP-provided defaults.

                              This register is Secure read/write only.
        fields:
          - name: DET0
            description: |-
              Set sensitivity for detector 0. Higher values are more sensitive.
            index: 0
            width: 2
            read: true
            write: true
          - name: DET1
            description: |-
              Set sensitivity for detector 1. Higher values are more sensitive.
            index: 2
            width: 2
            read: true
            write: true
          - name: DET2
            description: |-
              Set sensitivity for detector 2. Higher values are more sensitive.
            index: 4
            width: 2
            read: true
            write: true
          - name: DET3
            description: |-
              Set sensitivity for detector 3. Higher values are more sensitive.
            index: 6
            width: 2
            read: true
            write: true
          - name: DET0_INV
            description: |-
              Must be the inverse of DET0, else the default value is used.
            index: 8
            width: 2
            read: true
            write: true
          - name: DET1_INV
            description: |-
              Must be the inverse of DET1, else the default value is used.
            index: 10
            width: 2
            read: true
            write: true
          - name: DET2_INV
            description: |-
              Must be the inverse of DET2, else the default value is used.
            index: 12
            width: 2
            read: true
            write: true
          - name: DET3_INV
            description: |-
              Must be the inverse of DET3, else the default value is used.
            index: 14
            width: 2
            read: true
            write: true
          - name: DEFAULT
            index: 24
            width: 8
            read: true
            write: true
            type: GLITCH_DETECTOR_SENSITIVITY_DEFAULT
      - name: LOCK
        type: uint32_t
        expected_size: 4
        expected_offset: 12
        fields:
          - name: LOCK
            description: |-
              Write any nonzero value to disable writes to ARM, DISARM, SENSITIVITY and LOCK. This register is Secure read/write only.
            index: 0
            width: 8
            read: true
            write: true
      - name: TRIG_STATUS
        type: uint32_t
        expected_size: 4
        expected_offset: 16
        description: |-
          (read-write) Set when a detector output triggers. Write-1-clear.

                              (May immediately return high if the detector remains in a failed state. Detectors can only be cleared by a full reset of the switched core power domain.)

                              This register is Secure read/write only.
        fields:
          - name: DET0
            index: 0
            width: 1
            read: true
            write: true
          - name: DET1
            index: 1
            width: 1
            read: true
            write: true
          - name: DET2
            index: 2
            width: 1
            read: true
            write: true
          - name: DET3
            index: 3
            width: 1
            read: true
            write: true
      - name: TRIG_FORCE
        type: uint32_t
        expected_size: 4
        expected_offset: 20
        description: |-
          (write-only) Simulate the firing of one or more detectors. Writing ones to this register will set the matching bits in STATUS_TRIG.

                              If the glitch detectors are currently armed, writing ones will also immediately reset the switched core power domain, and set the reset reason latches in POWMAN_CHIP_RESET to indicate a glitch detector resets.

                              This register is Secure read/write only.
        fields:
          - name: TRIG_FORCE
            index: 0
            width: 4
            read: false
            write: true
enums:
  GLITCH_DETECTOR_ARM_ARM:
    enum:
      no:
        description: |-
          Do not force the glitch detectors to be armed
        value: 23469
      yes:
        description: |-
          Force the glitch detectors to be armed. (Any value other than ARM_NO counts as YES)
        value: 0
    unit_test: false
    json: false
    use_map: false
    identifier: false
    underlying: uint16_t
  GLITCH_DETECTOR_DISARM_DISARM:
    enum:
      no:
        description: |-
          Do not disarm the glitch detectors. (Any value other than DISARM_YES counts as NO)
        value: 0
      yes:
        description: |-
          Disarm the glitch detectors
        value: 56495
    unit_test: false
    json: false
    use_map: false
    identifier: false
    underlying: uint16_t
  GLITCH_DETECTOR_SENSITIVITY_DEFAULT:
    enum:
      yes:
        description: |-
          Use the default sensitivity configured in OTP for all detectors. (Any value other than DEFAULT_NO counts as YES)
        value: 0
      no:
        description: |-
          Do not use the default sensitivity configured in OTP. Instead use the value from this register.
        value: 222
    unit_test: false
    json: false
    use_map: false
    identifier: false
