---
structs:
  bootram:
    description: |-
      Additional registers mapped adjacent to the bootram, for use by the bootrom.
    instances:
      - name: BOOTRAM
        address: '0x400e0000'
    fields:
      - name: WRITE_ONCE0
        type: uint32_t
        expected_size: 4
        expected_offset: 2048
        description: |-
          (read-write) This registers always ORs writes into its current contents. Once a bit is set, it can only be cleared by a reset.
        fields:
          - name: WRITE_ONCE0
            index: 0
            width: 32
            read: true
            write: true
      - name: WRITE_ONCE1
        type: uint32_t
        expected_size: 4
        expected_offset: 2052
        description: |-
          (read-write) This registers always ORs writes into its current contents. Once a bit is set, it can only be cleared by a reset.
        fields:
