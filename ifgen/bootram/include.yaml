            width: 32
            read: true
            write: true
      - name: BOOTLOCK_STAT
        type: uint32_t
        expected_size: 4
        expected_offset: 2056
        description: |-
          (read-write) Bootlock status register. 1=unclaimed, 0=claimed. These locks function identically to the SIO spinlocks, but are reserved for bootrom use.
        fields:
          - name: BOOTLOCK_STAT
            index: 0
            width: 8
            read: true
            write: true
      - name: BOOTLOCK0
        type: uint32_t
        expected_size: 4
        expected_offset: 2060
        description: |-
          (read-write) Read to claim and check. Write to unclaim. The value returned on successful claim is 1 << n, and on failed claim is zero.
