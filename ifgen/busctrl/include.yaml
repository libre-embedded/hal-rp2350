---
structs:
  busctrl:
    description: |-
      Register block for busfabric control signals and performance counters
    instances:
      - name: BUSCTRL
        address: '0x40068000'
    fields:
      - name: BUS_PRIORITY
        type: uint32_t
        expected_size: 4
        expected_offset: 0
        description: |-
          (read-write) Set the priority of each master for bus arbitration.
        fields:
          - name: PROC0
            description: |-
              0 - low priority, 1 - high priority
            index: 0
            width: 1
            read: true
            write: true
          - name: PROC1
            description: |-
              0 - low priority, 1 - high priority
            index: 4
            width: 1
            read: true
            write: true
          - name: DMA_R
            description: |-
              0 - low priority, 1 - high priority
            index: 8
            width: 1
            read: true
            write: true
          - name: DMA_W
            description: |-
              0 - low priority, 1 - high priority
            index: 12
            width: 1
            read: true
            write: true
      - name: BUS_PRIORITY_ACK
        type: uint32_t
        expected_size: 4
        expected_offset: 4
        const: true
        description: |-
          (read-only) Bus priority acknowledge
        fields:
          - name: BUS_PRIORITY_ACK
            description: |-
              Goes to 1 once all arbiters have registered the new global priority levels. 
                                          Arbiters update their local priority when servicing a new nonsequential access. 
                                          In normal circumstances this will happen almost immediately.
            index: 0
            width: 1
            read: true
            write: false
      - name: PERFCTR_EN
        type: uint32_t
        expected_size: 4
        expected_offset: 8
        description: |-
          (read-write) Enable the performance counters. If 0, the performance counters do not increment. This can be used to precisely start/stop event sampling around the profiled section of code.

                              The performance counters are initially disabled, to save energy.
        fields:
          - name: PERFCTR_EN
            index: 0
            width: 1
            read: true
            write: true
      - name: PERFCTR0
        type: uint32_t
        expected_size: 4
        expected_offset: 12
        description: |-
          (read-write) Bus fabric performance counter 0
        fields:
          - name: PERFCTR0
            description: |-
              Busfabric saturating performance counter 0 
                                          Count some event signal from the busfabric arbiters, if PERFCTR_EN is set. 
                                          Write any value to clear. Select an event to count using PERFSEL0
            index: 0
            width: 24
            read: true
            write: true
      - name: PERFSEL0
        type: uint32_t
        expected_size: 4
        expected_offset: 16
        description: |-
          (read-write) Bus fabric performance event select for PERFCTR0
        fields:
          - name: PERFSEL0
            description: |-
              Select an event for PERFCTR0. For each downstream port of the main crossbar, four events are available: ACCESS, an access took place; ACCESS_CONTESTED, an access took place that previously stalled due to contention from other masters; STALL_DOWNSTREAM, count cycles where any master stalled due to a stall on the downstream bus; STALL_UPSTREAM, count cycles where any master stalled for any reason, including contention from other masters.
            index: 0
            width: 7
            read: true
            write: true
            type: BUSCTRL_PERFSEL0_PERFSEL0
      - name: PERFCTR1
        type: uint32_t
        expected_size: 4
        expected_offset: 20
        description: |-
          (read-write) Bus fabric performance counter 1
        fields:
          - name: PERFCTR1
            description: |-
              Busfabric saturating performance counter 1 
                                          Count some event signal from the busfabric arbiters, if PERFCTR_EN is set. 
                                          Write any value to clear. Select an event to count using PERFSEL1
            index: 0
            width: 24
            read: true
            write: true
      - name: PERFSEL1
        type: uint32_t
        expected_size: 4
        expected_offset: 24
        description: |-
          (read-write) Bus fabric performance event select for PERFCTR1
        fields:
          - name: PERFSEL1
            description: |-
              Select an event for PERFCTR1. For each downstream port of the main crossbar, four events are available: ACCESS, an access took place; ACCESS_CONTESTED, an access took place that previously stalled due to contention from other masters; STALL_DOWNSTREAM, count cycles where any master stalled due to a stall on the downstream bus; STALL_UPSTREAM, count cycles where any master stalled for any reason, including contention from other masters.
            index: 0
            width: 7
            read: true
            write: true
            type: BUSCTRL_PERFSEL1_PERFSEL1
      - name: PERFCTR2
        type: uint32_t
        expected_size: 4
        expected_offset: 28
        description: |-
          (read-write) Bus fabric performance counter 2
        fields:
          - name: PERFCTR2
            description: |-
              Busfabric saturating performance counter 2 
                                          Count some event signal from the busfabric arbiters, if PERFCTR_EN is set. 
                                          Write any value to clear. Select an event to count using PERFSEL2
            index: 0
            width: 24
            read: true
            write: true
      - name: PERFSEL2
        type: uint32_t
        expected_size: 4
        expected_offset: 32
        description: |-
          (read-write) Bus fabric performance event select for PERFCTR2
        fields:
          - name: PERFSEL2
            description: |-
              Select an event for PERFCTR2. For each downstream port of the main crossbar, four events are available: ACCESS, an access took place; ACCESS_CONTESTED, an access took place that previously stalled due to contention from other masters; STALL_DOWNSTREAM, count cycles where any master stalled due to a stall on the downstream bus; STALL_UPSTREAM, count cycles where any master stalled for any reason, including contention from other masters.
            index: 0
            width: 7
            read: true
            write: true
            type: BUSCTRL_PERFSEL2_PERFSEL2
      - name: PERFCTR3
        type: uint32_t
        expected_size: 4
        expected_offset: 36
        description: |-
          (read-write) Bus fabric performance counter 3
        fields:
          - name: PERFCTR3
            description: |-
              Busfabric saturating performance counter 3 
                                          Count some event signal from the busfabric arbiters, if PERFCTR_EN is set. 
                                          Write any value to clear. Select an event to count using PERFSEL3
            index: 0
            width: 24
            read: true
            write: true
      - name: PERFSEL3
        type: uint32_t
        expected_size: 4
        expected_offset: 40
        description: |-
          (read-write) Bus fabric performance event select for PERFCTR3
        fields:
          - name: PERFSEL3
            description: |-
              Select an event for PERFCTR3. For each downstream port of the main crossbar, four events are available: ACCESS, an access took place; ACCESS_CONTESTED, an access took place that previously stalled due to contention from other masters; STALL_DOWNSTREAM, count cycles where any master stalled due to a stall on the downstream bus; STALL_UPSTREAM, count cycles where any master stalled for any reason, including contention from other masters.
            index: 0
            width: 7
            read: true
            write: true
            type: BUSCTRL_PERFSEL3_PERFSEL3
