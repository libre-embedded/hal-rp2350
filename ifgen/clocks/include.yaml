---
structs:
  clocks:
    instances:
      - name: CLOCKS
        address: '0x40010000'
    fields:
      - name: CLK_GPOUT0_CTRL
        type: uint32_t
        expected_size: 4
        expected_offset: 0
        description: |-
          (read-write) Clock control, can be changed on-the-fly (except for auxsrc)
        fields:
          - name: AUXSRC
            description: |-
              Selects the auxiliary clock source, will glitch when switching
            index: 5
            width: 4
            read: true
            write: true
            type: CLOCKS_CLK_GPOUT0_CTRL_AUXSRC
          - name: KILL
            description: |-
              Asynchronously kills the clock generator, enable must be set low before deasserting kill
            index: 10
            width: 1
            read: true
            write: true
          - name: ENABLE
            description: |-
              Starts and stops the clock generator cleanly
            index: 11
            width: 1
            read: true
            write: true
          - name: DC50
            description: |-
              Enables duty cycle correction for odd divisors, can be changed on-the-fly
            index: 12
            width: 1
            read: true
            write: true
          - name: PHASE
            description: |-
              This delays the enable signal by up to 3 cycles of the input clock 
                                          This must be set before the clock is enabled to have any effect
            index: 16
            width: 2
            read: true
            write: true
          - name: NUDGE
            description: |-
              An edge on this signal shifts the phase of the output by 1 cycle of the input clock 
                                          This can be done at any time
            index: 20
            width: 1
            read: true
            write: true
          - name: ENABLED
            description: |-
              clock generator is enabled
            index: 28
            width: 1
            read: true
            write: false
      - name: CLK_GPOUT0_DIV
        type: uint32_t
        expected_size: 4
        expected_offset: 4
        fields:
          - name: FRAC
            description: |-
              Fractional component of the divisor, can be changed on-the-fly
            index: 0
            width: 16
            read: true
            write: true
          - name: INT
            description: |-
              Integer part of clock divisor, 0 -> max+1, can be changed on-the-fly
            index: 16
            width: 16
            read: true
            write: true
      - name: CLK_GPOUT0_SELECTED
        type: uint32_t
        expected_size: 4
        expected_offset: 8
        const: true
        description: |-
          (read-only) Indicates which src is currently selected (one-hot)
        fields:
          - name: CLK_GPOUT0_SELECTED
            description: |-
              This slice does not have a glitchless mux (only the AUX_SRC field is present, not SRC) so this register is hardwired to 0x1.
            index: 0
            width: 1
            read: true
            write: false
