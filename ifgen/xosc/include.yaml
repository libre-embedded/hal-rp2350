---
structs:
  xosc:
    description: |-
      Controls the crystal oscillator
    instances:
      - name: XOSC
        address: '0x40048000'
    fields:
      - name: CTRL
        type: uint32_t
        expected_size: 4
        expected_offset: 0
        description: |-
          (read-write) Crystal Oscillator Control
        fields:
          - name: FREQ_RANGE
            description: |-
              The 12-bit code is intended to give some protection against accidental writes. An invalid setting will retain the previous value. The actual value being used can be read from STATUS_FREQ_RANGE
            index: 0
            width: 12
            read: true
            write: true
            type: XOSC_CTRL_FREQ_RANGE
          - name: ENABLE
            description: |-
              On power-up this field is initialised to DISABLE and the chip runs from the ROSC. 
                                          If the chip has subsequently been programmed to run from the XOSC then setting this field to DISABLE may lock-up the chip. If  this is a concern then run the clk_ref from the ROSC and enable the clk_sys RESUS feature. 
                                          The 12-bit code is intended to give some protection against accidental writes. An invalid setting will retain the previous value. The actual value being used can be read from STATUS_ENABLED
            index: 12
            width: 12
            read: true
            write: true
            type: XOSC_CTRL_ENABLE
      - name: STATUS
        type: uint32_t
        expected_size: 4
        expected_offset: 4
        description: |-
          (read-write) Crystal Oscillator Status
        fields:
          - name: FREQ_RANGE
            description: |-
              The current frequency range setting
            index: 0
            width: 2
            read: true
            write: false
            type: XOSC_STATUS_FREQ_RANGE
          - name: ENABLED
            description: |-
              Oscillator is enabled but not necessarily running and stable, resets to 0
            index: 12
            width: 1
            read: true
            write: false
          - name: BADWRITE
            description: |-
              An invalid value has been written to CTRL_ENABLE or CTRL_FREQ_RANGE or DORMANT
            index: 24
            width: 1
            read: true
            write: true
          - name: STABLE
            description: |-
              Oscillator is running and stable
            index: 31
            width: 1
            read: true
            write: false
      - name: DORMANT
        type: uint32_t
        expected_size: 4
        expected_offset: 8
        description: |-
          (read-write) Crystal Oscillator pause control
        fields:
          - name: DORMANT
            description: |-
              This is used to save power by pausing the XOSC 
                                          On power-up this field is initialised to WAKE 
                                          An invalid write will also select WAKE 
                                          Warning: stop the PLLs before selecting dormant mode 
                                          Warning: setup the irq before selecting dormant mode
            index: 0
            width: 32
            read: true
            write: true
            type: XOSC_DORMANT_DORMANT
      - name: STARTUP
        type: uint32_t
        expected_size: 4
        expected_offset: 12
        description: |-
          (read-write) Controls the startup delay
        fields:
          - name: DELAY
            description: |-
              in multiples of 256*xtal_period. The reset value of 0xc4 corresponds to approx 50 000 cycles.
            index: 0
            width: 14
            read: true
            write: true
          - name: X4
            description: |-
              Multiplies the startup_delay by 4, just in case. The reset value is controlled by a mask-programmable tiecell and is provided in case we are booting from XOSC and the default startup delay is insufficient. The reset value is 0x0.
            index: 20
            width: 1
            read: true
            write: true
      - name: COUNT
        type: uint32_t
        expected_size: 4
        expected_offset: 16
        description: |-
          (read-write) A down counter running at the xosc frequency which counts to zero and stops. 
                              Can be used for short software pauses when setting up time sensitive hardware. 
                              To start the counter, write a non-zero value. Reads will return 1 while the count is running and 0 when it has finished. 
                              Minimum count value is 4. Count values <4 will be treated as count value =4. 
                              Note that synchronisation to the register clock domain costs 2 register clock cycles and the counter cannot compensate for that.
        fields:
          - name: COUNT
            index: 0
            width: 16
            read: true
            write: true
enums:
  XOSC_CTRL_FREQ_RANGE:
    enum:
      _1_15MHZ:
        value: 2720
      _10_30MHZ:
        value: 2721
      _25_60MHZ:
        value: 2722
      _40_100MHZ:
        value: 2723
    unit_test: false
    json: false
    use_map: false
    identifier: false
    underlying: uint16_t
  XOSC_CTRL_ENABLE:
    enum:
      DISABLE:
        value: 3358
      ENABLE:
        value: 4011
    unit_test: false
    json: false
    use_map: false
    identifier: false
    underlying: uint16_t
  XOSC_STATUS_FREQ_RANGE:
    enum:
      _1_15MHZ:
        value: 0
      _10_30MHZ:
        value: 1
      _25_60MHZ:
        value: 2
      _40_100MHZ:
        value: 3
    unit_test: false
    json: false
    use_map: false
    identifier: false
  XOSC_DORMANT_DORMANT:
    enum:
      dormant:
        value: 1668246881
      WAKE:
        value: 2002873189
    unit_test: false
    json: false
    use_map: false
    identifier: false
    underlying: uint16_t
