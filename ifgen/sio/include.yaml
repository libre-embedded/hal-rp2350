---
structs:
  sio:
    description: |-
      Single-cycle IO block 
                  Provides core-local and inter-core hardware for the two processors, with single-cycle access.
    instances:
      - name: SIO
        address: '0xd0000000'
      - name: SIO_NS
        address: '0xd0020000'
    fields:
      - name: CPUID
        type: uint32_t
        expected_size: 4
        expected_offset: 0
        const: true
        description: |-
          (read-only) Processor core identifier
        fields:
          - name: CPUID
            description: |-
              Value is 0 when read from processor core 0, and 1 when read from processor core 1.
            index: 0
            width: 32
            read: true
            write: false
      - name: GPIO_IN
        type: uint32_t
        expected_size: 4
        expected_offset: 4
        const: true
        description: |-
          (read-only) Input value for GPIO0...31.

                              In the Non-secure SIO, Secure-only GPIOs (as per ACCESSCTRL) appear as zero.
        fields:
          - name: GPIO_IN
            index: 0
            width: 32
            read: true
            write: false
      - name: GPIO_HI_IN
        type: uint32_t
        expected_size: 4
        expected_offset: 8
        const: true
        description: |-
          (read-only) Input value on GPIO32...47, QSPI IOs and USB pins

                              In the Non-secure SIO, Secure-only GPIOs (as per ACCESSCTRL) appear as zero.
        fields:
          - name: GPIO
            description: |-
              Input value on GPIO32...47
            index: 0
            width: 16
            read: true
            write: false
          - name: USB_DP
            description: |-
              Input value on USB D+ pin
            index: 24
            width: 1
            read: true
            write: false
          - name: USB_DM
            description: |-
              Input value on USB D- pin
            index: 25
            width: 1
            read: true
            write: false
          - name: QSPI_SCK
            description: |-
              Input value on QSPI SCK pin
            index: 26
            width: 1
            read: true
            write: false
          - name: QSPI_CSN
            description: |-
              Input value on QSPI CSn pin
            index: 27
            width: 1
            read: true
            write: false
          - name: QSPI_SD
            description: |-
              Input value on QSPI SD0 (MOSI), SD1 (MISO), SD2 and SD3 pins
            index: 28
            width: 4
            read: true
            write: false
      - name: GPIO_OUT
        type: uint32_t
        expected_size: 4
        expected_offset: 16
        description: |-
          (read-write) GPIO0...31 output value
        fields:
          - name: GPIO_OUT
            description: |-
              Set output level (1/0 -> high/low) for GPIO0...31. Reading back gives the last value written, NOT the input value from the pins.

                                          If core 0 and core 1 both write to GPIO_OUT simultaneously (or to a SET/CLR/XOR alias), the result is as though the write from core 0 took place first, and the write from core 1 was then applied to that intermediate result.

                                          In the Non-secure SIO, Secure-only GPIOs (as per ACCESSCTRL) ignore writes, and their output status reads back as zero. This is also true for SET/CLR/XOR aliases of this register.
            index: 0
            width: 32
            read: true
            write: true
      - name: GPIO_HI_OUT
        type: uint32_t
        expected_size: 4
        expected_offset: 20
        description: |-
          (read-write) Output value for GPIO32...47, QSPI IOs and USB pins.

                              Write to set output level (1/0 -> high/low). Reading back gives the last value written, NOT the input value from the pins. If core 0 and core 1 both write to GPIO_HI_OUT simultaneously (or to a SET/CLR/XOR alias), the result is as though the write from core 0 took place first, and the write from core 1 was then applied to that intermediate result.

                              In the Non-secure SIO, Secure-only GPIOs (as per ACCESSCTRL) ignore writes, and their output status reads back as zero. This is also true for SET/CLR/XOR aliases of this register.
        fields:
          - name: GPIO
            description: |-
              Output value for GPIO32...47
            index: 0
            width: 16
            read: true
            write: true
          - name: USB_DP
            description: |-
              Output value for USB D+ pin
            index: 24
            width: 1
            read: true
            write: true
          - name: USB_DM
            description: |-
              Output value for USB D- pin
            index: 25
            width: 1
            read: true
            write: true
          - name: QSPI_SCK
            description: |-
              Output value for QSPI SCK pin
            index: 26
            width: 1
            read: true
            write: true
          - name: QSPI_CSN
            description: |-
              Output value for QSPI CSn pin
            index: 27
            width: 1
            read: true
            write: true
          - name: QSPI_SD
            description: |-
              Output value for QSPI SD0 (MOSI), SD1 (MISO), SD2 and SD3 pins
            index: 28
            width: 4
            read: true
            write: true
      - name: GPIO_OUT_SET
        type: uint32_t
        expected_size: 4
        expected_offset: 24
        description: |-
          (write-only) GPIO0...31 output value set
        fields:
          - name: GPIO_OUT_SET
            description: |-
              Perform an atomic bit-set on GPIO_OUT, i.e. `GPIO_OUT |= wdata`
            index: 0
            width: 32
            read: false
            write: true
      - name: GPIO_HI_OUT_SET
        type: uint32_t
        expected_size: 4
        expected_offset: 28
        description: |-
