          - name: QSPI_SD
            index: 28
            width: 4
            read: false
            write: true
      - name: GPIO_OE
        type: uint32_t
        expected_size: 4
        expected_offset: 48
        description: |-
          (read-write) GPIO0...31 output enable
        fields:
          - name: GPIO_OE
            description: |-
