---
structs:
  timer0:
    description: |-
      Controls time and alarms

                  time is a 64 bit value indicating the time since power-on

                  timeh is the top 32 bits of time & timel is the bottom 32 bits to change time write to timelw before timehw to read time read from timelr before timehr

                  An alarm is set by setting alarm_enable and writing to the corresponding alarm register When an alarm is pending, the corresponding alarm_running signal will be high An alarm can be cancelled before it has finished by clearing the alarm_enable When an alarm fires, the corresponding alarm_irq is set and alarm_running is cleared To clear the interrupt write a 1 to the corresponding alarm_irq The timer can be locked to prevent writing
    instances:
      - name: TIMER0
        address: '0x400b0000'
      - name: TIMER1
        address: '0x400b8000'
    fields:
      - name: TIMEHW
        type: uint32_t
        expected_size: 4
        expected_offset: 0
        description: |-
          (write-only) Write to bits 63:32 of time always write timelw before timehw
        fields:
          - name: TIMEHW
            index: 0
            width: 32
            read: false
            write: true
      - name: TIMELW
        type: uint32_t
        expected_size: 4
        expected_offset: 4
        description: |-
          (write-only) Write to bits 31:0 of time writes do not get copied to time until timehw is written
        fields:
          - name: TIMELW
            index: 0
            width: 32
            read: false
            write: true
      - name: TIMEHR
        type: uint32_t
        expected_size: 4
        expected_offset: 8
        const: true
        description: |-
          (read-only) Read from bits 63:32 of time always read timelr before timehr
        fields:
          - name: TIMEHR
            index: 0
            width: 32
            read: true
            write: false
      - name: TIMELR
        type: uint32_t
        expected_size: 4
        expected_offset: 12
        const: true
        description: |-
          (read-only) Read from bits 31:0 of time
        fields:
          - name: TIMELR
            index: 0
            width: 32
            read: true
            write: false
      - name: ALARM0
        type: uint32_t
        expected_size: 4
        expected_offset: 16
        description: |-
          (read-write) Arm alarm 0, and configure the time it will fire. Once armed, the alarm fires when TIMER_ALARM0 == TIMELR. The alarm will disarm itself once it fires, and can be disarmed early using the ARMED status register.
        fields:
          - name: ALARM0
            index: 0
            width: 32
            read: true
            write: true
      - name: ALARM1
        type: uint32_t
        expected_size: 4
        expected_offset: 20
        description: |-
          (read-write) Arm alarm 1, and configure the time it will fire. Once armed, the alarm fires when TIMER_ALARM1 == TIMELR. The alarm will disarm itself once it fires, and can be disarmed early using the ARMED status register.
        fields:
          - name: ALARM1
            index: 0
            width: 32
            read: true
            write: true
      - name: ALARM2
        type: uint32_t
        expected_size: 4
        expected_offset: 24
        description: |-
          (read-write) Arm alarm 2, and configure the time it will fire. Once armed, the alarm fires when TIMER_ALARM2 == TIMELR. The alarm will disarm itself once it fires, and can be disarmed early using the ARMED status register.
        fields:
          - name: ALARM2
            index: 0
            width: 32
            read: true
            write: true
      - name: ALARM3
        type: uint32_t
        expected_size: 4
        expected_offset: 28
        description: |-
          (read-write) Arm alarm 3, and configure the time it will fire. Once armed, the alarm fires when TIMER_ALARM3 == TIMELR. The alarm will disarm itself once it fires, and can be disarmed early using the ARMED status register.
        fields:
          - name: ALARM3
            index: 0
            width: 32
            read: true
            write: true
      - name: ARMED
        type: uint32_t
        expected_size: 4
        expected_offset: 32
        description: |-
          (read-write) Indicates the armed/disarmed status of each alarm. A write to the corresponding ALARMx register arms the alarm. Alarms automatically disarm upon firing, but writing ones here will disarm immediately without waiting to fire.
        fields:
          - name: ARMED
            index: 0
            width: 4
            read: true
            write: true
      - name: TIMERAWH
        type: uint32_t
        expected_size: 4
        expected_offset: 36
        const: true
        description: |-
          (read-only) Raw read from bits 63:32 of time (no side effects)
        fields:
          - name: TIMERAWH
            index: 0
            width: 32
            read: true
            write: false
      - name: TIMERAWL
        type: uint32_t
        expected_size: 4
        expected_offset: 40
        const: true
        description: |-
          (read-only) Raw read from bits 31:0 of time (no side effects)
        fields:
          - name: TIMERAWL
            index: 0
            width: 32
            read: true
            write: false
      - name: DBGPAUSE
        type: uint32_t
        expected_size: 4
        expected_offset: 44
        description: |-
          (read-write) Set bits high to enable pause when the corresponding debug ports are active
        fields:
          - name: DBG0
            description: |-
              Pause when processor 0 is in debug mode
            index: 1
            width: 1
            read: true
            write: true
          - name: DBG1
            description: |-
              Pause when processor 1 is in debug mode
            index: 2
            width: 1
            read: true
            write: true
      - name: PAUSE
        type: uint32_t
        expected_size: 4
        expected_offset: 48
        description: |-
          (read-write) Set high to pause the timer
        fields:
          - name: PAUSE
            index: 0
            width: 1
            read: true
            write: true
      - name: LOCKED
        type: uint32_t
        expected_size: 4
        expected_offset: 52
        description: |-
          (read-write) Set locked bit to disable write access to timer Once set, cannot be cleared (without a reset)
        fields:
          - name: LOCKED
            index: 0
            width: 1
            read: true
            write: true
      - name: SOURCE
        type: uint32_t
        expected_size: 4
        expected_offset: 56
        description: |-
          (read-write) Selects the source for the timer. Defaults to the normal tick configured in the ticks block (typically configured to 1 microsecond). Writing to 1 will ignore the tick and count clk_sys cycles instead.
        fields:
          - name: CLK_SYS
            index: 0
            width: 1
            read: true
            write: true
      - name: INTR
        type: uint32_t
        expected_size: 4
        expected_offset: 60
        description: |-
          (read-write) Raw Interrupts
        fields:
          - name: ALARM_0
            index: 0
            width: 1
            read: true
            write: true
          - name: ALARM_1
            index: 1
            width: 1
            read: true
            write: true
          - name: ALARM_2
            index: 2
            width: 1
            read: true
            write: true
          - name: ALARM_3
            index: 3
            width: 1
            read: true
            write: true
      - name: INTE
        type: uint32_t
        expected_size: 4
        expected_offset: 64
        description: |-
          (read-write) Interrupt Enable
        fields:
          - name: ALARM_0
            index: 0
            width: 1
            read: true
            write: true
          - name: ALARM_1
            index: 1
            width: 1
            read: true
            write: true
          - name: ALARM_2
            index: 2
            width: 1
            read: true
            write: true
          - name: ALARM_3
            index: 3
            width: 1
            read: true
            write: true
      - name: INTF
        type: uint32_t
        expected_size: 4
        expected_offset: 68
        description: |-
          (read-write) Interrupt Force
        fields:
          - name: ALARM_0
            index: 0
            width: 1
            read: true
            write: true
          - name: ALARM_1
            index: 1
            width: 1
            read: true
            write: true
          - name: ALARM_2
            index: 2
            width: 1
            read: true
            write: true
          - name: ALARM_3
            index: 3
            width: 1
            read: true
            write: true
      - name: INTS
        type: uint32_t
        expected_size: 4
        expected_offset: 72
        const: true
        description: |-
          (read-only) Interrupt status after masking & forcing
        fields:
          - name: ALARM_0
            index: 0
            width: 1
            read: true
            write: false
          - name: ALARM_1
            index: 1
            width: 1
            read: true
            write: false
          - name: ALARM_2
            index: 2
            width: 1
            read: true
            write: false
          - name: ALARM_3
            index: 3
            width: 1
            read: true
            write: false
enums: {}
