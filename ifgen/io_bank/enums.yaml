---
enums:
  IO_BANK_OUTOVER:
    enum:
      NORMAL:
        description: |-
          drive output from peripheral signal selected by funcsel
        value: 0
      INVERT:
        description: |-
          drive output from inverse of peripheral signal selected by funcsel
        value: 1
      LOW:
        description: |-
          drive output low
        value: 2
      HIGH:
        description: |-
          drive output high
        value: 3
    unit_test: false
    json: false
    use_map: false
    identifier: false

  IO_BANK_OEOVER:
    enum:
      NORMAL:
        description: |-
          drive output enable from peripheral signal selected by funcsel
        value: 0
      INVERT:
        description: |-
          drive output enable from inverse of peripheral signal (funcsel)
        value: 1
      DISABLE:
        description: |-
          disable output
        value: 2
      ENABLE:
        description: |-
          enable output
        value: 3
    unit_test: false
    json: false
    use_map: false
    identifier: false

  IO_BANK_INOVER:
    enum:
      NORMAL:
        description: |-
          don't invert the peri input
        value: 0
      INVERT:
        description: |-
          invert the peri input
        value: 1
      LOW:
        description: |-
          drive peri input low
        value: 2
      HIGH:
        description: |-
          drive peri input high
        value: 3
    unit_test: false
    json: false
    use_map: false
    identifier: false

  IO_BANK_IRQOVER:
    enum:
      NORMAL:
        description: |-
          don't invert the interrupt
        value: 0
      INVERT:
        description: |-
          invert the interrupt
        value: 1
      LOW:
        description: |-
          drive interrupt low
        value: 2
      HIGH:
        description: |-
          drive interrupt high
        value: 3
    unit_test: false
    json: false
    use_map: false
    identifier: false

