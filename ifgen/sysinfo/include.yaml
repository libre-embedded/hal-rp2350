---
structs:
  sysinfo:
    instances:
      - name: SYSINFO
        address: '0x40000000'
    fields:
      - name: CHIP_ID
        type: uint32_t
        expected_size: 4
        expected_offset: 0
        const: true
        description: |-
          (read-only) JEDEC JEP-106 compliant chip identifier.
        fields:
          - name: STOP_BIT
            index: 0
            width: 1
            read: true
            write: false
          - name: MANUFACTURER
            index: 1
            width: 11
            read: true
            write: false
          - name: PART
            index: 12
            width: 16
            read: true
            write: false
          - name: REVISION
            index: 28
            width: 4
            read: true
            write: false
      - name: PACKAGE_SEL
        type: uint32_t
        expected_size: 4
        expected_offset: 4
        const: true
        fields:
          - name: PACKAGE_SEL
            index: 0
            width: 1
            read: true
            write: false
      - name: PLATFORM
        type: uint32_t
        expected_size: 4
        expected_offset: 8
        const: true
        description: |-
          (read-only) Platform register. Allows software to know what environment it is running in during pre-production development. Post-production, the PLATFORM is always ASIC, non-SIM.
        fields:
          - name: FPGA
            index: 0
            width: 1
            read: true
            write: false
          - name: ASIC
            index: 1
            width: 1
            read: true
            write: false
          - name: HDLSIM
            index: 2
            width: 1
            read: true
            write: false
          - name: BATCHSIM
            index: 3
            width: 1
            read: true
            write: false
          - name: GATESIM
            index: 4
            width: 1
            read: true
            write: false
      - name: GITREF_RP2350
        type: uint32_t
        expected_size: 4
        expected_offset: 20
        const: true
        description: |-
          (read-only) Git hash of the chip source. Used to identify chip version.
        fields:
          - name: GITREF_RP2350
            index: 0
            width: 32
            read: true
            write: false
enums: {}
